<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>ameni monitor вҖ” live demo</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;700&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#08040e;font-family:'JetBrains Mono',monospace;min-height:100vh;color:#c0c0cc;overflow-x:hidden}
  body::before{content:'';position:fixed;top:0;left:0;right:0;bottom:0;
    background:radial-gradient(ellipse at 20% 50%,#1a0a2e 0%,transparent 60%),
               radial-gradient(ellipse at 80% 20%,#2a1040 0%,transparent 50%);z-index:-1}
  .container{max-width:900px;margin:0 auto;padding:20px}
  .ascii{font-size:7px;line-height:1.1;text-align:center;margin:5px 0 12px;white-space:pre;color:#a855f7;opacity:0.6}
  h1{font-size:20px;font-weight:300;text-align:center;margin:0 0 4px;
    background:linear-gradient(90deg,#a855f7,#e9d5ff,#a855f7);background-size:200% auto;
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:shim 4s linear infinite}
  @keyframes shim{0%{background-position:0% center}50%{background-position:200% center}100%{background-position:0% center}}
  .sub{color:#6b4a7b;font-size:10px;text-align:center;margin-bottom:16px}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  @media(max-width:640px){.grid{grid-template-columns:1fr}}
  .card{background:linear-gradient(135deg,#12071e,#1a0a2e);border:1px solid #2a1040;border-radius:8px;padding:14px 16px}
  .card-title{color:#6b4a7b;font-size:9px;text-transform:uppercase;letter-spacing:1px;margin-bottom:10px}
  .metric{display:flex;justify-content:space-between;align-items:center;padding:3px 0;font-size:12px}
  .label{color:#6b4a7b;min-width:80px}
  .value{color:#c084fc;font-weight:700}
  .bar-wrap{width:100%;height:6px;background:#1a0820;border-radius:3px;overflow:hidden;margin:4px 0}
  .bar-fill{height:100%;border-radius:3px;transition:width .6s ease}
  .bar-green{background:linear-gradient(90deg,#22c55e,#4ade80)}
  .bar-yellow{background:linear-gradient(90deg,#f59e0b,#fbbf24)}
  .bar-red{background:linear-gradient(90deg,#ef4444,#dc2626)}
  .bar-purple{background:linear-gradient(90deg,#7c3aed,#a855f7)}
  .disk-row{display:flex;justify-content:space-between;align-items:center;padding:3px 0;font-size:11px}
  .disk-row .mount{color:#a855f7;min-width:60px}
  .disk-row .pct{color:#c084fc;min-width:35px;text-align:right}
  .net-row{display:flex;justify-content:space-between;padding:3px 0;font-size:11px}
  .net-row .iface{color:#a855f7;min-width:50px}
  .net-row .speed{color:#c084fc}
  .footer{text-align:center;margin-top:16px;font-size:9px;color:#4a2a5a}
  .premium-badge{display:inline-block;background:linear-gradient(90deg,#7c3aed,#a855f7);color:#fff;font-size:8px;padding:2px 6px;border-radius:3px;margin-left:6px}
  .pulse{animation:pulse 2s ease-in-out infinite}
  @keyframes pulse{0%{opacity:1}50%{opacity:.4}100%{opacity:1}}
  .blink{animation:blink 1s step-end infinite}
  @keyframes blink{0%{opacity:1}50%{opacity:0}}
</style>
</head>
<body>
<div class="container">

<div class="ascii" id="asciiBlock"></div>

<h1>ameni monitor вҖ” system dashboard</h1>
<div class="sub" id="sysLine">Linux <span id="distro">Arch Linux</span> <span id="kernel">6.5.7</span>  |  <span id="arch">x86_64</span></div>

<div class="grid">

  <!-- CPU -->
  <div class="card">
    <div class="card-title">cpu</div>
    <div class="metric"><span class="label">Usage</span><span class="value" id="cpuUsage">--</span></div>
    <div class="bar-wrap"><div class="bar-fill" id="cpuBar" style="width:0%"></div></div>
    <div class="metric"><span class="label">Load Avg</span><span class="value" id="cpuLoad">--</span></div>
    <div class="metric"><span class="label">Cores</span><span class="value" id="cpuCores">8 cores</span></div>
    <div class="metric"><span class="label">Freq</span><span class="value" id="cpuFreq">--</span></div>
    <div class="metric"><span class="label">Temp</span><span class="value" id="cpuTemp">--</span></div>
  </div>

  <!-- Memory -->
  <div class="card">
    <div class="card-title">memory <span class="premium-badge">PREMIUM</span></div>
    <div class="metric"><span class="label">RAM Used</span><span class="value" id="memUsed">--</span></div>
    <div class="bar-wrap"><div class="bar-fill" id="memBar" style="width:0%"></div></div>
    <div class="metric"><span class="label">Available</span><span class="value" id="memAvail">--</span></div>
    <div class="metric"><span class="label">Swap</span><span class="value" id="memSwap">--</span></div>
    <div class="bar-wrap"><div class="bar-fill" id="swapBar" style="width:0%"></div></div>
  </div>

  <!-- Disks -->
  <div class="card">
    <div class="card-title">disks</div>
    <div id="diskContent"></div>
  </div>

  <!-- Network -->
  <div class="card">
    <div class="card-title">network</div>
    <div id="netContent"></div>
  </div>

</div>

<!-- History (premium) -->
<div class="card" style="margin-top:10px">
  <div class="card-title">history (CPU last 30 min) <span class="premium-badge">PREMIUM</span></div>
  <canvas id="historyCanvas" width="800" height="200" style="width:100%;height:120px;border-radius:4px;background:#0a0212"></canvas>
  <div style="display:flex;justify-content:space-between;font-size:8px;color:#4a2a5a;margin-top:4px">
    <span id="timeStart">now</span><span>CPU % over time</span><span id="timeEnd">now</span>
  </div>
</div>

<div class="footer" id="footer"><span class="pulse">в—Ҹ</span> live demo &mdash; РҫРұРҪРҫРІР»РөРҪРёРө РәР°Р¶РҙСӢРө 2 СҒРөРә</div>

</div>

<script>
(function() {
  var ascii = [
    'в Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв ҖвўІвў„в Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җ',
    'в Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв ҖвЎҶв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җ',
    'в Җв Җв Җв Җв Җв Җв Җв ҖвўҖв „в Ӯвўүв Өв җв Ӣв Ҳв ЎвЎҲв үв җв  вЎҖв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җ',
    'в Җв Җв Җв ҖвўҖвЎҖвў вЈӨв ”в ҒвўҖв Җв Җв Җв Җв Җв Җв Җв Ҳвўўв Җв Җв Ҳв ұвЎӨвЈӨв „вЈҖв Җв Җв Җв Җв Җ',
    'в Җв Җв °в Ғв ҖвЈ°вЈҝв ғв Җвў в ғвўёв Җв Җв Җв Җв Җв Җв Җв Җв Ғв Җв Җв Җв ҲвўһвЈҰвЎҖв ҲвЎҮв Җв Җв Җ',
    'в Җв Җв ҖвўҮвЈ вЎҝв Ғв ҖвўҖвЎғв ҖвЈҲв Җв Җв Җв Җвў°вЎҖв Җв Җв Җв Җвўўв °в Җв ҖвўәвЈ§вў°в Җв Җв Җв Җ',
    'в Җв Җв Җв ҲвЈҝв ҒвЎҳв ҖвЎҢвЎҮв ҖвЎҝв ёв Җв Җв Җв ҲвЎ•вЎ„в Җв җвЎҖв Ҳв Җвўғв Җв Җв ҫв Үв Җв Җв Җв Җ',
    'в Җв Җв Җв Җв ҮвЎҮв ғвў в Җв ¶вЎҖвЎҮвўғв ЎвЎҖв Җв Җв Ўв ҲвўӮвЎҖвўҒв ҖвЎҒв ёв ҖвЎҶв ҳвЎҖв Җв Җв Җв Җ',
    'в Җв Җв Җв ёв Җвўёв Җв ҳвЎңв ҖвЈ‘вўҙвЈҖв ‘в ҜвЎӮв „вЈҖвЈЈвўҖвЈҲвўәвЎңвўЈв ҖвЎҶвЎҮв ҖвўЈв Җв Җв Җв Җ',
    'в Җв Җв Җв Үв Җвўёв ҖвЎ—вЈ°вЎҝвЎ»в ҝвЎівЎ…в Җв Җв Җв Җв ҲвЎөв ҝв ҝвЎ»вЈ·вЎЎвЎҮвЎҮв ҖвўёвЈҮв Җв Җв Җ',
    'в Җв Җвў°в Җв ҖвЎҶвЎ„вЈ§вЎҸв ёвў вўІвўёв Ғв Җв Җв Җв Җв җвўҷвў°в ӮвўЎв ҳвЈҮвЎҮв ғв Җв Җвў№вЎ„в Җв Җ',
    'в Җв Җв ҹв Җв Җвў°вўҒвЎҮв Үв °вЈҖвўҒвЎңв Җв Җв Җв Җв Җв Җв ҳвЈҖвЈҒв Ңв Җв ғв °в Җв Җв Җв Ҳв °в Җв Җ',
    'в ҖвЎҳв Җв Җв Җв ҖвўҠвЈӨв Җв Җв Өв „в Җв Җв Җв Җв Җв Җв Җв Җв Җв Өв „в Җвўёв ғв Җв Җв Җв Җв Җв ғв Җ',
    'вў в ҒвўҖв Җв Җв Җв ҲвўҝвЎҖв Җв Җв Җв Җв Җв ҖвўҖвЎҖв Җв Җв Җв Җв Җв ҖвўҖв Ҹв Җв Җв Җв Җв Җв Җв ёв Җ',
    'в ҳв ёв ҳвЎҖв Җв Җв Җв ҖвўЈв Җв Җв Җв Җв Җв Җв Ғв Җв ғв Җв Җв Җв ҖвўҖв Һв Җв Җв Җв Җв Җвў в Җв ҖвЎҮ',
    'в Җв ҮвўҶвўғв Җв Җв Җв Җв ҖвЎҸвўІвўӨвўҖвЎҖв Җв Җв Җв Җв ҖвўҖвЈ в „вЎҡв Җв Җв Җв Җв Җв ҖвЈҫв Җв Җв Җ',
    'вў°в ҲвўҢвўҺвўҶв Җв Җв Җв Җв ҒвЈҢв ҶвЎ°вЎҒв үв үв Җв үв ҒвЎұвЎҳвЎјв Үв Җв Җв Җв ҖвўҖвў¬в ғвў в ҖвЎҶ',
    'в Җвўўв Җв ‘вўөвЈ§вЎҖв Җв ҖвЎҝв ів Ӯв үв Җв Җв Җв Җв Җв Җв Җв ҒвўәвЎҖв Җв ҖвўҖвў вЈ®в ғвўҖв ҶвЎ°в Җ',
    'в Җв Җв ‘в „вЈҖв ҷвЎӯв ўвўҖвЎҖв Җв Ғв „вЈҖвЈҖв ҖвўҖвЈҖвЈҖвЈҖвЎ в ӮвўғвЎҖв ”в ұвЎһвўҒв „вЈҒв ”в Ғв Җ',
    'в Җв Җв Җв Җв Җвў в Ғв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв ёв үв Ғв Җв Җв Җв Җ',
    'в Җв Җв Җв Җв ҖвЎ„в Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв Җв ҖвЎҮв Җв Җв Җв Җв Җ'
  ];
  var el = document.getElementById('asciiBlock');
  var colors = ['#a855f7','#c084fc','#d8b4fe','#e9d5ff','#7c3aed','#9333ea'];
  ascii.forEach(function(l,i){
    var s = document.createElement('span');
    s.style.color = colors[i % 6];
    s.textContent = l;
    el.appendChild(s);
    el.appendChild(document.createTextNode('\n'));
  });
})();

function rnd(min,max){return Math.round((Math.random()*(max-min)+min)*10)/10}
function rndI(min,max){return Math.floor(Math.random()*(max-min+1)+min)}
function pick(arr){return arr[Math.floor(Math.random()*arr.length)]}

var hist = [];
var t0 = Date.now();

function barColor(p){
  if(p<60) return '#22c55e';
  if(p<85) return '#f59e0b';
  return '#ef4444';
}

function fmtB(b){
  if(b>1073741824) return (b/1073741824).toFixed(1)+'GB';
  if(b>1048576) return (b/1048576).toFixed(1)+'MB';
  if(b>1024) return (b/1024).toFixed(1)+'KB';
  return b+'B';
}

function drawHist(){
  var c = document.getElementById('historyCanvas');
  if(!c) return;
  var ctx = c.getContext('2d');
  var w = c.width, h = c.height;
  ctx.clearRect(0,0,w,h);
  if(hist.length<2) return;
  ctx.beginPath();
  ctx.moveTo(0, h);
  for(var i=0;i<hist.length;i++){
    var x = (i/(hist.length-1))*w;
    var y = h - (hist[i]/100)*h;
    ctx.lineTo(x, y);
  }
  ctx.lineTo(w, h);
  ctx.closePath();
  var grad = ctx.createLinearGradient(0,0,0,h);
  grad.addColorStop(0,'rgba(168,85,247,0.4)');
  grad.addColorStop(1,'rgba(168,85,247,0.02)');
  ctx.fillStyle = grad;
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo(0, h - (hist[0]/100)*h);
  for(var i=1;i<hist.length;i++){
    ctx.lineTo((i/(hist.length-1))*w, h - (hist[i]/100)*h);
  }
  ctx.strokeStyle = '#a855f7';
  ctx.lineWidth = 2;
  ctx.stroke();
}

function update(){
  var cu = rnd(10,95);
  document.getElementById('cpuUsage').textContent = cu+'%';
  document.getElementById('cpuBar').style.width = cu+'%';
  document.getElementById('cpuBar').style.background = 'linear-gradient(90deg,'+barColor(cu)+',#4ade80)';
  document.getElementById('cpuLoad').textContent = rnd(0,3)+'  '+rnd(0,2)+'  '+rnd(0,1);
  var freqs = [];
  for(var i=0;i<8;i++) freqs.push(rndI(400,3200));
  document.getElementById('cpuFreq').textContent = freqs.slice(0,4).map(function(f){return f+'MHz'}).join(' ');
  document.getElementById('cpuTemp').textContent = rnd(35,85)+'\u00b0C';

  var mp = rnd(40,92);
  var mt = rnd(6,32);
  var ma = mt*(1-mp/100);
  document.getElementById('memUsed').textContent = mp+'%';
  document.getElementById('memBar').style.width = mp+'%';
  document.getElementById('memBar').style.background = 'linear-gradient(90deg,'+barColor(mp)+',#4ade80)';
  document.getElementById('memAvail').textContent = ma.toFixed(1)+' / '+mt+' GB';
  var sp = rnd(0,90);
  document.getElementById('memSwap').textContent = sp+'%';
  document.getElementById('swapBar').style.width = sp+'%';
  document.getElementById('swapBar').style.background = 'linear-gradient(90deg,'+barColor(sp)+',#4ade80)';

  var disks = [
    {m:'/', p:rnd(20,95), u:rnd(10,200), t:240},
    {m:'/home', p:rnd(20,95), u:rnd(50,400), t:500},
    {m:'/mnt/data', p:rnd(20,95), u:rnd(100,900), t:1000}
  ];
  var dh = '';
  disks.forEach(function(d){
    var bc = barColor(d.p);
    dh += '<div class="disk-row"><span class="mount">'+d.m+'</span>'+
      '<span style="flex:1;margin:0 8px"><div class="bar-wrap" style="height:4px">'+
      '<div class="bar-fill" style="width:'+d.p+'%;background:linear-gradient(90deg,'+bc+',#4ade80)"></div></div></span>'+
      '<span class="pct">'+d.p.toFixed(1)+'%</span>'+
      '<span style="color:#6b4a7b;font-size:10px;min-width:50px;text-align:right">'+d.u.toFixed(1)+'/'+d.t+'G</span></div>';
  });
  document.getElementById('diskContent').innerHTML = dh;

  var ifaces = [
    {n:'wlan0', r:rndI(100,5000000), t:rndI(50,1000000)},
    {n:'eth0', r:rndI(0,1000), t:rndI(0,500)}
  ];
  var nh = '';
  ifaces.forEach(function(n){
    nh += '<div class="net-row"><span class="iface">'+n.n+'</span>'+
      '<span class="speed">\u2193 '+fmtB(n.r)+'  \u2191 '+fmtB(n.t)+'</span></div>';
  });
  document.getElementById('netContent').innerHTML = nh;

  hist.push(cu);
  if(hist.length>180) hist.shift();
  drawHist();

  var d = new Date();
  document.getElementById('timeStart').textContent = d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
  document.getElementById('timeEnd').textContent = d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
}

update();
setInterval(update, 2000);
</script>
</body>
</html>
