<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>△</text></svg>">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>ameni monitor</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#0c0618;font-family:monospace;min-height:100vh;color:#e8e0f0;overflow-x:hidden}
  body::before{content:'';position:fixed;top:0;left:0;right:0;bottom:0;
    background:radial-gradient(ellipse at 50% 0%,#1a0a2e 0%,transparent 70%);z-index:-1}
  
  /* Top bar */
  .topbar{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;
    background:#12071e;border-bottom:1px solid #2a1040;font-size:11px}
  .topbar-left{display:flex;align-items:center;gap:10px}
  .topbar-logo{color:#c084fc;font-weight:700;font-size:13px}
  .topbar-logo span{color:#4a2070;font-weight:400}
  .topbar-right{display:flex;align-items:center;gap:12px;color:#7a4a8a;font-size:10px}
  .topbar-right .sysinfo{color:#7a4a8a}
  .topbar-right .sysinfo span{color:#9a7ab5}
  
  /* Window grid */
  .workspace{max-width:1100px;margin:0 auto;padding:12px}
  .window-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  @media(max-width:700px){.window-grid{grid-template-columns:1fr}}
  
  /* Window widget */
  .window{background:#0c0618;border:1px solid #2a1040;border-radius:6px;overflow:hidden;
    box-shadow:0 4px 20px rgba(0,0,0,0.3)}
  .window-title{display:flex;align-items:center;justify-content:space-between;
    padding:6px 10px;background:#12071e;border-bottom:1px solid #1a0a2e;font-size:10px;
    color:#7a4a8a;user-select:none}
  .window-title .name{color:#c084fc;font-weight:700}
  .window-title .dots{display:flex;gap:4px}
  .window-title .dot{width:6px;height:6px;border-radius:50%;display:inline-block}
  .dot.close{background:#ef4444}
  .dot.min{background:#fbbf24}
  .dot.max{background:#34d399}
  .window-body{padding:10px 12px;min-height:70px}
  .window-body .metric{display:flex;justify-content:space-between;align-items:center;padding:3px 0;font-size:11px}
  .window-body .label{color:#7a4a8a}
  .window-body .value{color:#c084fc;font-weight:700}
  .window-body .bar-wrap{width:100%;height:5px;background:#1a0820;border-radius:3px;overflow:hidden;margin:4px 0}
  .window-body .bar-fill{height:100%;border-radius:3px;transition:width .6s ease}
  
  /* Full-width windows */
  .window-full{grid-column:1/-1}
  
  /* Footer */
  .footer{text-align:center;padding:12px;font-size:9px;color:#4a2a5a}
  
  .premium-badge{display:inline-block;background:linear-gradient(90deg,#a855f7,#c084fc);color:#fff;font-size:7px;padding:1px 5px;border-radius:2px;margin-left:4px;letter-spacing:1px}
  
  .disk-row,.net-row{display:flex;justify-content:space-between;padding:2px 0;font-size:10px}
  .disk-row .mount,.net-row .iface{color:#c084fc;min-width:50px}
  .disk-row .pct,.net-row .speed{color:#9a7ab5}
  .proc-row{display:flex;justify-content:space-between;padding:2px 0;font-size:10px}
  .proc-row .idx{color:#7a4a8a;min-width:16px}
  .proc-row .name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:#9a7ab5}
  .proc-row .mem{color:#7a4a8a;min-width:30px;text-align:right}
  
  .pulse{animation:pulse 2s ease-in-out infinite}
  @keyframes pulse{0%{opacity:1}50%{opacity:.4}100%{opacity:1}}
  
  /* Auth */
  .auth-section{display:flex;align-items:center;gap:8px}
  .auth-section input{background:#0c0618;border:1px solid #2a1040;border-radius:3px;padding:4px 6px;color:#c084fc;font-family:monospace;font-size:10px;outline:none;width:80px}
  .auth-section input:focus{border-color:#4a2070}
  .auth-section button{background:linear-gradient(90deg,#7c3aed,#a855f7);border:none;border-radius:3px;padding:4px 8px;color:#fff;font-family:monospace;font-size:9px;cursor:pointer}
  .auth-section button:hover{opacity:.9}
  .auth-user{font-size:10px;color:#9a7ab5}
</style>
</head>
<body>
<div class="topbar">
  <div class="topbar-left">
    <span class="topbar-logo">ameni<span> monitor</span></span>
  </div>
  <div class="topbar-right">
    <span class="sysinfo"><span id="distro">--</span> <span id="kernel">--</span> <span id="arch">--</span></span>
    <div class="auth-section" id="authWidget"></div>
  </div>
</div>

<div class="workspace">
  <div class="window-grid">

    <!-- CPU -->
    <div class="window">
      <div class="window-title">
        <span class="name">cpu</span>
        <span class="dots"><span class="dot close"></span><span class="dot min"></span><span class="dot max"></span></span>
      </div>
      <div class="window-body">
        <div class="metric"><span class="label">Usage</span><span class="value" id="cpuUsage">--</span></div>
        <div class="bar-wrap"><div class="bar-fill" id="cpuBar" style="width:0%"></div></div>
        <div class="metric"><span class="label">Load Avg</span><span class="value" id="cpuLoad">--</span></div>
        <div class="metric"><span class="label">Cores</span><span class="value" id="cpuCores">--</span></div>
        <div class="metric"><span class="label">Freq</span><span class="value" id="cpuFreq">--</span></div>
        <div class="metric"><span class="label">Temp</span><span class="value" id="cpuTemp">--</span></div>
      </div>
    </div>

    <!-- Memory -->
    <div class="window">
      <div class="window-title">
        <span class="name">memory</span>
        <span class="dots"><span class="dot close"></span><span class="dot min"></span><span class="dot max"></span></span>
      </div>
      <div class="window-body">
        <div class="metric"><span class="label">RAM Used</span><span class="value" id="memUsed">--</span></div>
        <div class="bar-wrap"><div class="bar-fill" id="memBar" style="width:0%"></div></div>
        <div class="metric"><span class="label">Available</span><span class="value" id="memAvail">--</span></div>
        <div class="metric"><span class="label">Swap</span><span class="value" id="memSwap">--</span></div>
        <div class="bar-wrap"><div class="bar-fill" id="swapBar" style="width:0%"></div></div>
      </div>
    </div>

    <!-- Uptime -->
    <div class="window">
      <div class="window-title">
        <span class="name">uptime</span>
        <span class="dots"><span class="dot close"></span><span class="dot min"></span><span class="dot max"></span></span>
      </div>
      <div class="window-body">
        <div id="uptimeContent" style="font-size:20px;font-weight:700;color:#c084fc;text-align:center;padding:10px 0">--</div>
      </div>
    </div>

    <!-- Battery -->
    <div class="window" id="batteryCard" style="display:none">
      <div class="window-title">
        <span class="name">battery</span>
        <span class="dots"><span class="dot close"></span><span class="dot min"></span><span class="dot max"></span></span>
      </div>
      <div class="window-body">
        <div id="batteryContent" style="font-size:20px;font-weight:700;text-align:center;padding:10px 0">--</div>
      </div>
    </div>

    <!-- Disk -->
    <div class="window window-full">
      <div class="window-title">
        <span class="name">disk</span>
        <span class="dots"><span class="dot close"></span><span class="dot min"></span><span class="dot max"></span></span>
      </div>
      <div class="window-body" id="diskContent"></div>
    </div>

    <!-- Network -->
    <div class="window window-full">
      <div class="window-title">
        <span class="name">network</span>
        <span class="dots"><span class="dot close"></span><span class="dot min"></span><span class="dot max"></span></span>
      </div>
      <div class="window-body" id="netContent"></div>
    </div>

    <!-- Processes -->
    <div class="window window-full">
      <div class="window-title">
        <span class="name">processes</span>
        <span class="dots"><span class="dot close"></span><span class="dot min"></span><span class="dot max"></span></span>
      </div>
      <div class="window-body" id="procContent"></div>
    </div>

  </div>

  <!-- History (premium) -->
  <div class="window window-full premium-card" id="historyCard" style="margin-top:10px;display:none">
    <div class="window-title">
      <span class="name">history <span class="premium-badge">PREMIUM</span></span>
      <span class="dots"><span class="dot close"></span><span class="dot min"></span><span class="dot max"></span></span>
    </div>
    <div class="window-body">
      <canvas id="historyCanvas" width="800" height="120" style="width:100%;height:80px;border-radius:3px;background:#0a0212"></canvas>
      <div style="display:flex;justify-content:space-between;font-size:8px;color:#4a2a5a;margin-top:4px">
        <span id="timeStart">now</span><span>CPU % over time</span><span id="timeEnd">now</span>
      </div>
    </div>
  </div>

  <!-- Disk I/O (premium) -->
  <div class="window window-full premium-card" id="diskIOCard" style="margin-top:10px;display:none">
    <div class="window-title">
      <span class="name">disk i/o <span class="premium-badge">PREMIUM</span></span>
      <span class="dots"><span class="dot close"></span><span class="dot min"></span><span class="dot max"></span></span>
    </div>
    <div class="window-body" id="diskIOContent"></div>
  </div>

  <!-- Premium activation -->
  <div class="window window-full" id="premiumCard" style="margin-top:10px">
    <div class="window-title">
      <span class="name">premium <span id="premiumBadge" class="premium-badge" style="display:none">ACTIVE</span></span>
      <span class="dots"><span class="dot close"></span><span class="dot min"></span><span class="dot max"></span></span>
    </div>
    <div class="window-body">
      <div id="premiumStatus" style="font-size:10px;color:#7a4a8a;margin-bottom:6px">Checking...</div>
      <div id="loginForm" style="display:none;margin-bottom:6px">
        <div style="display:flex;gap:4px;flex-wrap:wrap">
          <input id="loginInput" type="text" placeholder="login" spellcheck="false"
            style="background:#0c0618;border:1px solid #2a1040;border-radius:3px;padding:4px 6px;color:#c084fc;font-family:monospace;font-size:10px;outline:none;width:100px">
          <input id="passwordInput" type="password" placeholder="password"
            style="background:#0c0618;border:1px solid #2a1040;border-radius:3px;padding:4px 6px;color:#c084fc;font-family:monospace;font-size:10px;outline:none;width:100px">
          <button onclick="amenokeLogin()" style="background:linear-gradient(90deg,#7c3aed,#a855f7);border:none;border-radius:3px;padding:4px 8px;color:#fff;font-family:monospace;font-size:9px;cursor:pointer">Sign In</button>
        </div>
        <div style="font-size:9px;margin-top:4px;color:#4a2a5a">
          <a href="https://amenoke.ru" target="_blank" style="color:#7c3aed;text-decoration:none">amenoke.ru</a> register
        </div>
        <div id="loginError" style="font-size:9px;color:#ef4444;margin-top:2px"></div>
      </div>
      <div id="loggedInInfo" style="display:none;font-size:10px;margin-bottom:6px">
        <span id="loggedInUsername" style="color:#c084fc"></span>
        <span id="loggedInPremium" style="color:#7a4a8a"></span>
        <button onclick="amenokeLogout()" style="background:none;border:1px solid #2a1040;border-radius:3px;padding:2px 6px;color:#7a4a8a;font-size:9px;cursor:pointer;margin-left:4px">logout</button>
      </div>
      <div id="offlineSection" style="border-top:1px solid #1a0820;padding-top:6px;margin-top:4px">
        <div style="font-size:8px;color:#4a2a5a;margin-bottom:3px">offline key</div>
        <div style="display:flex;gap:4px">
          <input id="licenseInput" type="text" placeholder="paste license key" spellcheck="false"
            style="flex:1;background:#0c0618;border:1px solid #2a1040;border-radius:3px;padding:4px 6px;color:#c084fc;font-family:monospace;font-size:9px;outline:none">
          <button onclick="activateLicense()" style="background:linear-gradient(90deg,#7c3aed,#a855f7);border:none;border-radius:3px;padding:4px 8px;color:#fff;font-family:monospace;font-size:9px;cursor:pointer">Activate</button>
        </div>
        <div id="premiumResult" style="font-size:9px;margin-top:4px;color:#7a4a8a"></div>
      </div>
    </div>
  </div>

</div>

<div class="footer"><span class="pulse">●</span> ameni monitor</div><script>
// Fetch system info// Fetch system info for top bar
fetch('/api/system').then(function(r){return r.json()}).then(function(d){
  document.getElementById('distro').textContent = d.distro || d.os;
  document.getElementById('kernel').textContent = d.kernel || '';
  document.getElementById('arch').textContent = d.arch || '';
});

function rnd(min,max){return Math.round((Math.random()*(max-min)+min)*10)/10}
function rndI(min,max){return Math.floor(Math.random()*(max-min+1)+min)}
function pick(arr){return arr[Math.floor(Math.random()*arr.length)]}

var hist = [];
var t0 = Date.now();

function barColor(p){
  if(p<60) return '#34d399';
  if(p<85) return '#fbbf24';
  return '#ef4444';
}

function fmtB(b){
  if(b>1073741824) return (b/1073741824).toFixed(1)+'GB';
  if(b>1048576) return (b/1048576).toFixed(1)+'MB';
  if(b>1024) return (b/1024).toFixed(1)+'KB';
  return b+'B';
}

function drawHist(){
  var c = document.getElementById('historyCanvas');
  if(!c) return;
  var ctx = c.getContext('2d');
  var w = c.width, h = c.height;
  ctx.clearRect(0,0,w,h);
  if(hist.length<2) return;
  ctx.beginPath();
  ctx.moveTo(0, h);
  for(var i=0;i<hist.length;i++){
    var x = (i/(hist.length-1))*w;
    var y = h - (hist[i]/100)*h;
    ctx.lineTo(x, y);
  }
  ctx.lineTo(w, h);
  ctx.closePath();
  var grad = ctx.createLinearGradient(0,0,0,h);
  grad.addColorStop(0,'rgba(168,85,247,0.4)');
  grad.addColorStop(1,'rgba(168,85,247,0.02)');
  ctx.fillStyle = grad;
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo(0, h - (hist[0]/100)*h);
  for(var i=1;i<hist.length;i++){
    ctx.lineTo((i/(hist.length-1))*w, h - (hist[i]/100)*h);
  }
  ctx.strokeStyle = '#c084fc';
  ctx.lineWidth = 2;
  ctx.stroke();
}

function checkPremium(){
  fetch('/api/premium').then(function(r){return r.json()}).then(function(d){
    var badge = document.getElementById('premiumBadge');
    var loginForm = document.getElementById('loginForm');
    var loggedInInfo = document.getElementById('loggedInInfo');
    var offlineSection = document.getElementById('offlineSection');
    var st = document.getElementById('premiumStatus');
    var authWidget = document.getElementById('authWidget');

    if(d.premium){
      st.innerHTML = '<span style="color:#34d399">PREMIUM ACTIVE</span>';
      badge.style.display = 'inline-block';
      loginForm.style.display = 'none';
      loggedInInfo.style.display = 'none';
      offlineSection.style.display = 'none';
      authWidget.innerHTML = '<span class="auth-user">'+(d.username||'')+' <span style="color:#34d399;font-weight:700">*</span></span>';
    } else if(d.username){
      loggedInInfo.style.display = 'block';
      document.getElementById('loggedInUsername').textContent = d.username;
      document.getElementById('loggedInPremium').textContent = '| not premium';
      loginForm.style.display = 'none';
      st.innerHTML = 'Signed in as <span style="color:#c084fc">'+d.username+'</span>';
      badge.style.display = 'none';
      offlineSection.style.display = 'block';
      authWidget.innerHTML = '<span class="auth-user">'+d.username+'</span>';
    } else {
      loginForm.style.display = 'flex';
      loginForm.style.flexDirection = 'row';
      loginForm.style.flexWrap = 'wrap';
      loggedInInfo.style.display = 'none';
      st.innerHTML = '<span style="color:#7a4a8a">amenoke.ru</span>';
      badge.style.display = 'none';
      offlineSection.style.display = 'block';
      authWidget.innerHTML = '';
    }
  });
}

function amenokeLogin(){
  var login = document.getElementById('loginInput').value.trim();
  var password = document.getElementById('passwordInput').value.trim();
  if(!login || !password){ document.getElementById('loginError').textContent = 'Enter login and password'; return; }
  var btn = document.getElementById('loginBtn');
  btn.textContent = 'Signing in...'; btn.disabled = true;
  fetch('/api/login', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({login:login, password:password})})
    .then(function(r){return r.json()}).then(function(d){
      if(d.ok){
        document.getElementById('loginError').textContent = '';
        checkPremium();
      }else{
        document.getElementById('loginError').textContent = d.error || 'Login failed';
      }
      btn.textContent = 'Sign In'; btn.disabled = false;
    });
}

function amenokeLogout(){
  fetch('/api/logout', {method:'POST'}).then(function(r){return r.json()}).then(function(d){
    checkPremium();
  });
}

function activateLicense(){
  var key = document.getElementById('licenseInput').value.trim();
  if(!key){ document.getElementById('premiumResult').textContent = 'Enter a license key'; return; }
  var btn = document.getElementById('activateBtn');
  btn.textContent = 'Activating...'; btn.disabled = true;
  fetch('/api/activate', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({key:key})})
    .then(function(r){return r.json()}).then(function(d){
      var pr = document.getElementById('premiumResult');
      if(d.ok && d.premium){
        pr.innerHTML = '<span style="color:#34d399">License activated for ' + (d.email||'') + '</span>';
        checkPremium();
      } else if(d.ok){
        pr.innerHTML = '<span style="color:#ef4444">Invalid license key</span>';
      } else {
        pr.innerHTML = '<span style="color:#ef4444">' + (d.error||'Activation failed') + '</span>';
      }
      btn.textContent = 'Activate'; btn.disabled = false;
    });
}

checkPremium();

function update(){
  fetch('/api/monitor/all').then(function(r){return r.json()}).then(function(d){
    var cpu = d.cpu || {};
    document.getElementById('cpuUsage').textContent = (cpu.usage||0)+'%';
    document.getElementById('cpuBar').style.width = (cpu.usage||0)+'%';
    document.getElementById('cpuBar').style.background = 'linear-gradient(90deg,'+barColor(cpu.usage||0)+',#4ade80)';
    document.getElementById('cpuLoad').textContent = (cpu.load_avg||[0,0,0]).join('  ');
    document.getElementById('cpuCores').textContent = (cpu.cores||0)+' cores';
    var freqText = (cpu.freq||[]).slice(0,4).map(function(f){return Math.round(f)+'MHz'}).join(' ');
    document.getElementById('cpuFreq').textContent = freqText || '--';
    document.getElementById('cpuTemp').textContent = (cpu.temp||0)+'°C';

    var mem = d.memory || {};
    document.getElementById('memUsed').textContent = (mem.used_pct||0)+'%';
    document.getElementById('memBar').style.width = (mem.used_pct||0)+'%';
    document.getElementById('memBar').style.background = 'linear-gradient(90deg,'+barColor(mem.used_pct||0)+',#4ade80)';
    var totalGb = mem.total_gb || 0;
    var availGb = mem.avail_gb || 0;
    document.getElementById('memAvail').textContent = availGb.toFixed(1)+' / '+totalGb.toFixed(1)+' GB';
    document.getElementById('memSwap').textContent = (mem.swap_used_pct||0)+'%';
    document.getElementById('swapBar').style.width = (mem.swap_used_pct||0)+'%';
    document.getElementById('swapBar').style.background = 'linear-gradient(90deg,'+barColor(mem.swap_used_pct||0)+',#4ade80)';

    var disks = d.disk || [];
    var dh = '';
    disks.forEach(function(dd){
      var bc = barColor(dd.used_pct||0);
      dh += '<div class="disk-row"><span class="mount">'+dd.mount+'</span>'+
        '<span style="flex:1;margin:0 8px"><div class="bar-wrap" style="height:4px">'+
        '<div class="bar-fill" style="width:'+dd.used_pct+'%;background:linear-gradient(90deg,'+bc+',#4ade80)"></div></div></span>'+
        '<span class="pct">'+dd.used_pct+'%</span>'+
        '<span style="color:#7a4a8a;font-size:10px;min-width:50px;text-align:right">'+(dd.used_gb||0).toFixed(1)+'/'+(dd.total_gb||0).toFixed(1)+'G</span></div>';
    });
    document.getElementById('diskContent').innerHTML = dh || '<div style="color:#7a4a8a;font-size:10px">No disk data</div>';

    var ifaces = d.network || [];
    var nh = '';
    ifaces.forEach(function(n){
      nh += '<div class="net-row"><span class="iface">'+n.iface+'</span>'+
        '<span class="speed">↓ '+fmtB(n.rx_bytes||0)+'  ↑ '+fmtB(n.tx_bytes||0)+'</span></div>';
    });
    document.getElementById('netContent').innerHTML = nh || '<div style="color:#7a4a8a;font-size:10px">No network data</div>';

    var uptime = d.uptime || {};
    var ut = '';
    if(uptime.days > 0) ut += uptime.days + 'd ';
    ut += uptime.hours + 'h ' + uptime.mins + 'm';
    document.getElementById('uptimeContent').textContent = ut;

    var bat = d.battery;
    var bc = document.getElementById('batteryCard');
    if(bat){
      bc.style.display = 'block';
      var color = bat.pct > 50 ? '#34d399' : (bat.pct > 20 ? '#fbbf24' : '#ef4444');
      var charging = bat.status == 'Charging' ? ' ⚡' : '';
      document.getElementById('batteryContent').innerHTML = '<span style="color:'+color+'">'+bat.pct+'%</span> <span style="color:#7a4a8a;font-size:10px">'+bat.status+charging+'</span>';
    }else{
      bc.style.display = 'none';
    }

    var procs = d.processes || [];
    var ph = '';
    procs.forEach(function(p, i){
      if(i >= 5) return;
      ph += '<div style="display:flex;justify-content:space-between;padding:2px 0;font-size:10px">'+
        '<span style="color:#c084fc;min-width:20px">'+(i+1)+'</span>'+
        '<span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:#9a7ab5">'+p.name+'</span>'+
        '<span style="color:#7a4a8a;min-width:30px;text-align:right">'+p.mem+'M</span></div>';
    });
    document.getElementById('procContent').innerHTML = ph || '<div style="color:#7a4a8a;font-size:10px">No processes</div>';

    var cu = cpu.usage || 0;
    hist.push(cu);
    if(hist.length>180) hist.shift();
    drawHist();

    var dio = d.diskio;
    if(dio){
      var dih = '';
      var keys = Object.keys(dio);
      keys.forEach(function(k){
        var v = dio[k];
        dih += '<div style="display:flex;justify-content:space-between;padding:2px 0;font-size:10px">'+
          '<span style="color:#c084fc;min-width:40px">'+k+'</span>'+
          '<span style="color:#7a4a8a">↓ '+fmtB(v.rbytes)+'  ↑ '+fmtB(v.wbytes)+'</span></div>';
      });
      document.getElementById('diskIOContent').innerHTML = dih || '<div style="color:#7a4a8a;font-size:10px">No disk I/O data</div>';
    }

    var dt = new Date();
    document.getElementById('timeStart').textContent = dt.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
    document.getElementById('timeEnd').textContent = dt.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
  });
}

update();
setInterval(update, 2000);

// Toggle premium features visibility
function togglePremiumFeatures(){
  fetch('/api/premium').then(function(r){return r.json()}).then(function(d){
    var isPrem = d.premium;
    document.querySelectorAll('.premium-card').forEach(function(el){
      el.style.display = isPrem ? 'block' : 'none';
    });
  });
}

togglePremiumFeatures();
setInterval(togglePremiumFeatures, 30000);
</script>
</body>
</html>
