<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>ameni monitor</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#f8f6fc;font-family:system-ui,-apple-system,sans-serif;min-height:100vh;
    color:#2a1a3e;overflow-x:auto;padding:24px}
  body::before{content:'';position:fixed;top:0;left:0;right:0;bottom:0;
    background:radial-gradient(ellipse at 50% 20%,rgba(168,85,247,0.1) 0%,transparent 60%);z-index:-1}
  .container{max-width:1300px;margin:0 auto;padding:0 16px}
  .ascii{font-family:monospace;font-size:10px;line-height:1.2;text-align:center;margin:6px 0 20px;
    white-space:pre;opacity:0.9;letter-spacing:0.5px}
  h1{font-size:34px;font-weight:700;text-align:center;margin:0 0 6px;letter-spacing:0;
    background:linear-gradient(135deg,#7c3aed,#a855f7,#c084fc);
    -webkit-background-clip:text;-webkit-text-fill-color:transparent}
  .sub{font-size:14px;text-align:center;margin:0 0 24px;color:#a888c8}
  .sub span{color:#7c3aed;font-weight:600}

  .section-label{font-size:13px;text-transform:uppercase;letter-spacing:3px;color:#c0a8d8;
    text-align:center;margin:24px 0 16px;grid-column:1/13;font-weight:700}

  .grid{display:grid;grid-template-columns:repeat(12,1fr);gap:20px;position:relative;z-index:2}
  .grid>div{position:relative;z-index:2}

  .g-cpu{grid-column:3/11;grid-row:1}
  .g-memory{grid-column:1/6;grid-row:2}
  .g-uptime{grid-column:7/13;grid-row:2}
  .g-battery{grid-column:7/13;grid-row:3}
  .g-disk{grid-column:1/7;grid-row:3}
  .g-network{grid-column:8/12;grid-row:4}
  .g-processes{grid-column:1/6;grid-row:4}

  .g-premium-label{grid-column:1/13;grid-row:5;text-align:center;margin:8px 0 0}
  .g-history{grid-column:2/12;grid-row:6}
  .g-diskio{grid-column:3/11;grid-row:7}
  .g-auth{grid-column:4/10;grid-row:8}

  .card{background:#fff;border:1px solid #e0d0ea;border-radius:16px;padding:24px 28px;
    box-shadow:0 3px 12px rgba(124,58,237,0.07),0 10px 32px rgba(124,58,237,0.09);position:relative}
  .card:hover{box-shadow:0 6px 20px rgba(124,58,237,0.12),0 14px 48px rgba(124,58,237,0.13);
    transform:translateY(-2px);border-color:#d0b8e0}
  .card::after{content:'';position:absolute;top:16px;right:20px;width:12px;height:12px;
    border-radius:50%;background:linear-gradient(135deg,#7c3aed,#c084fc);opacity:0.25}
  .card-title{color:#7c3aed;font-size:14px;text-transform:uppercase;letter-spacing:3px;margin-bottom:14px;font-weight:700}

  .premium-card{border:2px solid;border-image:linear-gradient(135deg,#a855f7,#c084fc,#7c3aed) 1;
    border-radius:16px}
  .premium-card .card{box-shadow:0 3px 16px rgba(168,85,247,0.18)}
  .premium-node{display:none}

  .metric{display:flex;justify-content:space-between;align-items:center;padding:6px 0;font-size:17px}
  .label{color:#9a7ab5;font-size:14px}
  .value{color:#2a1a3e;font-weight:600;font-size:18px}
  .bar-wrap{width:100%;height:14px;background:#f0e8f8;border-radius:7px;overflow:hidden;margin:6px 0}
  .bar-fill{height:100%;border-radius:7px;transition:width .4s ease;background:linear-gradient(90deg,#a855f7,#c084fc)}

  .disk-row,.net-row,.proc-row{display:flex;justify-content:space-between;align-items:center;
    padding:6px 0;font-size:15px;border-bottom:1px solid #f2ecf8}
  .disk-row:last-child,.net-row:last-child,.proc-row:last-child{border-bottom:none}
  .disk-row .mount,.net-row .iface{color:#7c3aed;min-width:70px;font-weight:600;font-size:14px}
  .disk-row .pct{color:#9a7ab5;min-width:45px;text-align:right}
  .proc-row .name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:#4a3060;font-size:14px}
  .proc-row .mem{color:#7c3aed;min-width:40px;text-align:right;font-weight:600;font-size:14px}

  .big-text{font-size:42px;font-weight:700;text-align:center;padding:10px 0;
    background:linear-gradient(135deg,#7c3aed,#c084fc);-webkit-background-clip:text;-webkit-text-fill-color:transparent}

  .footer{text-align:center;margin-top:20px;font-size:11px;color:#c8b0d8;letter-spacing:1px}

  .premium-badge{display:inline-block;background:linear-gradient(135deg,#7c3aed,#c084fc);
    color:#fff;font-size:10px;padding:3px 10px;border-radius:5px;margin-left:8px;font-weight:700;letter-spacing:0.5px}

  /* Premium section label */
  .prem-label{font-size:12px;text-transform:uppercase;letter-spacing:4px;color:#c084fc;font-weight:700;
    text-align:center;padding:8px 0;position:relative}
  .prem-label::before,.prem-label::after{content:'';display:inline-block;width:60px;height:1px;
    background:linear-gradient(90deg,transparent,#c084fc);vertical-align:middle;margin:0 12px}
  .prem-label::after{background:linear-gradient(90deg,#c084fc,transparent)}

  .auth-card{background:#fff;border:1px solid #e0d0ea;border-radius:16px;padding:20px 24px;
    box-shadow:0 2px 8px rgba(124,58,237,0.06)}
  .auth-card .title{color:#7c3aed;font-size:12px;text-transform:uppercase;letter-spacing:2.5px;margin-bottom:12px;font-weight:700}
  .auth-card input{background:#f8f6fc;border:1px solid #e0d0ea;border-radius:8px;padding:12px 16px;
    color:#2a1a3e;font-family:inherit;font-size:15px;outline:none;margin-bottom:8px;width:280px}
  .auth-card input:focus{border-color:#a855f7;box-shadow:0 0 0 3px rgba(168,85,247,0.12)}
  .auth-card button{background:linear-gradient(135deg,#7c3aed,#c084fc);border:none;border-radius:8px;
    padding:12px 24px;color:#fff;font-family:inherit;font-size:14px;cursor:pointer;font-weight:600;margin-left:6px}
  .auth-card button:hover{box-shadow:0 3px 12px rgba(124,58,237,0.3)}
  .auth-card .hint{font-size:11px;color:#c8b0d8;margin-top:6px}
  .auth-card .hint a{color:#9a7ab5;text-decoration:none}
  .auth-card .error{font-size:11px;color:#e53e3e;margin-top:4px}

  /* History canvas extra large */
  canvas{border-radius:10px;background:#f8f6fc;width:100%;height:200px;border:1px solid #f0e8f8}
  .canvas-label{display:flex;justify-content:space-between;font-size:10px;color:#b8a0c8;margin-top:4px}

  .pulse{animation:pulse 2s ease-in-out infinite}
  @keyframes pulse{0%{opacity:1}50%{opacity:0.4}100%{opacity:1}}

  .bg-lines{position:fixed;top:0;left:0;width:100vw;height:100vh;z-index:0;pointer-events:none;opacity:0.2}
  .bg-lines path{stroke:#a855f7;stroke-width:1.5;fill:none}
  .bg-lines circle{fill:#c084fc;opacity:0.25}

  @media(max-width:900px){
    .grid{display:flex;flex-direction:column;gap:14px}
    .grid>div{grid-column:auto!important;grid-row:auto!important}
    .bg-lines{display:none}
  }
</style>
</head>
<body>

<svg class="bg-lines" viewBox="0 0 1200 1200" preserveAspectRatio="none">
  <path d="M0,200 Q600,80 1200,200"/>
  <path d="M0,400 Q600,500 1200,400"/>
  <path d="M0,600 Q600,500 1200,600"/>
  <path d="M0,800 Q600,900 1200,800"/>
  <path d="M0,1000 Q600,900 1200,1000"/>
  <path d="M400,0 Q300,600 400,1200"/>
  <path d="M800,0 Q900,600 800,1200"/>
  <circle cx="300" cy="250" r="5"/>
  <circle cx="900" cy="350" r="4"/>
  <circle cx="200" cy="550" r="4"/>
  <circle cx="1000" cy="550" r="3"/>
  <circle cx="500" cy="450" r="6"/>
  <circle cx="700" cy="650" r="5"/>
  <circle cx="600" cy="850" r="7"/>
</svg>

<div class="container">
<div class="ascii" id="asciiBlock"></div>
<h1>ameni monitor</h1>
<div class="sub"><span id="distro">--</span> <span id="kernel">--</span> <span id="arch">--</span></div>

<div class="grid">

  <div class="g-cpu">
    <div class="card">
      <div class="card-title">cpu</div>
      <div class="metric"><span class="label">Usage</span><span class="value" id="cpuUsage">--</span></div>
      <div class="bar-wrap"><div class="bar-fill" id="cpuBar" style="width:0%"></div></div>
      <div class="metric"><span class="label">Load</span><span class="value" id="cpuLoad">--</span></div>
      <div class="metric"><span class="label">Cores</span><span class="value" id="cpuCores">--</span></div>
      <div class="metric"><span class="label">Freq</span><span class="value" id="cpuFreq">--</span></div>
      <div class="metric"><span class="label">Temp</span><span class="value" id="cpuTemp">--</span></div>
    </div>
  </div>

  <div class="g-memory">
    <div class="card">
      <div class="card-title">memory</div>
      <div class="metric"><span class="label">RAM</span><span class="value" id="memUsed">--</span></div>
      <div class="bar-wrap"><div class="bar-fill" id="memBar" style="width:0%"></div></div>
      <div class="metric"><span class="label">Avail</span><span class="value" id="memAvail">--</span></div>
      <div class="metric"><span class="label">Swap</span><span class="value" id="memSwap">--</span></div>
      <div class="bar-wrap"><div class="bar-fill" id="swapBar" style="width:0%"></div></div>
    </div>
  </div>

  <div class="g-uptime">
    <div class="card">
      <div class="card-title">uptime</div>
      <div id="uptimeContent" class="big-text">--</div>
    </div>
  </div>

  <div class="g-battery" id="batteryCard" style="display:none">
    <div class="card">
      <div class="card-title">battery</div>
      <div id="batteryContent" class="big-text">--</div>
    </div>
  </div>

  <div class="g-disk">
    <div class="card">
      <div class="card-title">disk</div>
      <div id="diskContent"></div>
    </div>
  </div>

  <div class="g-network">
    <div class="card">
      <div class="card-title">network</div>
      <div id="netContent"></div>
    </div>
  </div>

  <div class="g-processes">
    <div class="card">
      <div class="card-title">processes</div>
      <div id="procContent"></div>
    </div>
  </div>

  <!-- Premium section label -->
  <div class="g-premium-label">
    <div class="prem-label">premium features</div>
  </div>

  <div class="g-history premium-node" id="historyNode">
    <div class="premium-card">
      <div class="card">
        <div class="card-title">history <span class="premium-badge">PREMIUM</span></div>
        <canvas id="historyCanvas"></canvas>
        <div class="canvas-label"><span id="timeStart">now</span><span>CPU %</span><span id="timeEnd">now</span></div>
      </div>
    </div>
  </div>

  <div class="g-diskio premium-node" id="diskIONode">
    <div class="premium-card">
      <div class="card">
        <div class="card-title">disk i/o <span class="premium-badge">PREMIUM</span></div>
        <div id="diskIOContent"></div>
      </div>
    </div>
  </div>

  <div class="g-auth">
    <div class="auth-card">
      <div class="title">premium <span id="premiumBadge" class="premium-badge" style="display:none">ACTIVE</span></div>
      <div id="premiumStatus" style="font-size:14px;color:#9a7ab5;margin-bottom:10px">Checking...</div>
      <div id="loginForm" style="display:none;margin-bottom:8px">
        <div><input id="loginInput" type="text" placeholder="username or email"></div>
        <div style="display:flex;gap:8px;align-items:center">
          <input id="passwordInput" type="password" placeholder="password">
          <button id="loginBtn" onclick="amenokeLogin()">Sign In</button>
        </div>
        <div class="hint"><a href="https://amenoke.ru" target="_blank">amenoke.ru</a> έΑΦ register</div>
        <div id="loginError" class="error"></div>
      </div>
      <div id="loggedInInfo" style="display:none;font-size:14px;margin-bottom:8px">
        <span id="loggedInUsername" style="color:#7c3aed;font-weight:600"></span>
        <span id="loggedInPremium" style="color:#9a7ab5"></span>
        <button onclick="amenokeLogout()" style="background:none;border:1px solid #e0d0ea;border-radius:6px;padding:6px 14px;color:#9a7ab5;font-size:13px;cursor:pointer;margin-left:6px">logout</button>
      </div>
      <div id="offlineSection" style="border-top:1px solid #f0e8f8;padding-top:10px;margin-top:6px">
        <div style="font-size:11px;color:#c8b0d8;margin-bottom:6px">offline key</div>
        <div style="display:flex;gap:8px;align-items:center">
          <input id="licenseInput" type="text" placeholder="paste license key" style="width:300px">
          <button id="activateBtn" onclick="activateLicense()">Activate</button>
        </div>
        <div id="premiumResult" style="font-size:12px;margin-top:6px;color:#9a7ab5"></div>
      </div>
    </div>
  </div>

</div>

<div class="footer">ameni monitor</div>
</div>

function barColor(p){if(p<60)return'#34d399';if(p<85)return'#fbbf24';return'#ef4444';}
function fmtB(b){
  if(b>1073741824)return(b/1073741824).toFixed(1)+'GB';
  if(b>1048576)return(b/1048576).toFixed(1)+'MB';
  if(b>1024)return(b/1024).toFixed(1)+'KB';
  return b+'B';}

var hist=[];

function drawHist(){
  var c=document.getElementById('historyCanvas');if(!c)return;
  var ctx=c.getContext('2d');var w=c.width,h=c.height;
  ctx.clearRect(0,0,w,h);if(hist.length<2)return;
  ctx.beginPath();ctx.moveTo(0,h);
  for(var i=0;i<hist.length;i++)ctx.lineTo((i/(hist.length-1))*w,h-(hist[i]/100)*h);
  ctx.lineTo(w,h);ctx.closePath();
  var g=ctx.createLinearGradient(0,0,0,h);
  g.addColorStop(0,'rgba(168,85,247,0.35)');g.addColorStop(1,'rgba(168,85,247,0.02)');
  ctx.fillStyle=g;ctx.fill();
  ctx.beginPath();
  for(var i=0;i<hist.length;i++){
    var x=(i/(hist.length-1))*w,y=h-(hist[i]/100)*h;
    if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);}
  ctx.strokeStyle='#c084fc';ctx.lineWidth=2.5;ctx.stroke();}

function checkPremium(){
  fetch('/api/premium').then(function(r){return r.json()}).then(function(d){
    document.getElementById('premiumBadge').style.display=d.premium?'inline-block':'none';
    var s=document.getElementById('premiumStatus');
    var lf=document.getElementById('loginForm');
    var li=document.getElementById('loggedInInfo');
    var os=document.getElementById('offlineSection');
    if(d.premium){
      s.innerHTML='<span style="color:#34d399;font-weight:600">PREMIUM ACTIVE</span>';
      lf.style.display='none';li.style.display='none';os.style.display='none';}
    else if(d.username){
      li.style.display='block';document.getElementById('loggedInUsername').textContent=d.username;
      document.getElementById('loggedInPremium').textContent='| not premium';
      lf.style.display='none';s.innerHTML='<span style="color:#9a7ab5">Logged in as '+d.username+'</span>';
      document.getElementById('premiumBadge').style.display='none';os.style.display='block';}
    else{
      lf.style.display='block';li.style.display='none';
      s.innerHTML='<span style="color:#9a7ab5">Sign in via amenoke.ru</span>';
      document.getElementById('premiumBadge').style.display='none';os.style.display='block';}});}

function amenokeLogin(){
  var l=document.getElementById('loginInput').value.trim();
  var p=document.getElementById('passwordInput').value.trim();
  if(!l||!p){document.getElementById('loginError').textContent='Enter login and password';return;}
  var b=document.getElementById('loginBtn');b.textContent='Signing in...';b.disabled=true;
  fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({login:l,password:p})})
    .then(function(r){return r.json()}).then(function(d){
      if(d.ok){document.getElementById('loginError').textContent='';checkPremium();}
      else{document.getElementById('loginError').textContent=d.error||'Login failed';}
      b.textContent='Sign In';b.disabled=false;});}

function amenokeLogout(){
  fetch('/api/logout',{method:'POST'}).then(function(r){return r.json()}).then(function(d){checkPremium();});}

function activateLicense(){
  var k=document.getElementById('licenseInput').value.trim();
  if(!k){document.getElementById('premiumResult').textContent='Enter a license key';return;}
  var b=document.getElementById('activateBtn');b.textContent='Activating...';b.disabled=true;
  fetch('/api/activate',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({key:k})})
    .then(function(r){return r.json()}).then(function(d){
      var pr=document.getElementById('premiumResult');
      if(d.ok&&d.premium){pr.innerHTML='<span style="color:#34d399">License activated</span>';checkPremium();}
      else if(d.ok){pr.innerHTML='<span style="color:#ef4444">Invalid license key</span>';}
      else{pr.innerHTML='<span style="color:#ef4444">'+(d.error||'Activation failed')+'</span>';}
      b.textContent='Activate';b.disabled=false;});}

checkPremium();

function update(){
  fetch('/api/monitor/all').then(function(r){return r.json()}).then(function(d){
    var c=d.cpu||{};
    document.getElementById('cpuUsage').textContent=(c.usage||0)+'%';
    document.getElementById('cpuBar').style.width=(c.usage||0)+'%';
    document.getElementById('cpuBar').style.background='linear-gradient(90deg,'+barColor(c.usage||0)+',#34d399)';
    document.getElementById('cpuLoad').textContent=(c.load_avg||[0,0,0]).join('  ');
    document.getElementById('cpuCores').textContent=(c.cores||0)+' cores';
    var f=(c.freq||[]).slice(0,4).map(function(f){return Math.round(f)+'MHz'}).join(' ');
    document.getElementById('cpuFreq').textContent=f||'--';
    document.getElementById('cpuTemp').textContent=(c.temp||0)+'┬░C';

    var m=d.memory||{};
    document.getElementById('memUsed').textContent=(m.used_pct||0)+'%';
    document.getElementById('memBar').style.width=(m.used_pct||0)+'%';
    document.getElementById('memBar').style.background='linear-gradient(90deg,'+barColor(m.used_pct||0)+',#34d399)';
    document.getElementById('memAvail').textContent=(m.avail_gb||0).toFixed(1)+' / '+(m.total_gb||0).toFixed(1)+' GB';
    document.getElementById('memSwap').textContent=(m.swap_used_pct||0)+'%';
    document.getElementById('swapBar').style.width=(m.swap_used_pct||0)+'%';
    document.getElementById('swapBar').style.background='linear-gradient(90deg,'+barColor(m.swap_used_pct||0)+',#34d399)';

    var ds=d.disk||[];var dh='';
    ds.forEach(function(dd){
      var bc=barColor(dd.used_pct||0);
      dh+='<div class="disk-row"><span class="mount">'+dd.mount+'</span>'+
        '<span style="flex:1;margin:0 10px"><div class="bar-wrap" style="height:6px"><div class="bar-fill" style="width:'+dd.used_pct+'%;background:linear-gradient(90deg,'+bc+',#34d399)"></div></div></span>'+
        '<span class="pct">'+dd.used_pct+'%</span>'+
        '<span style="color:#7a4a8a;font-size:11px;min-width:60px;text-align:right">'+(dd.used_gb||0).toFixed(1)+'/'+(dd.total_gb||0).toFixed(1)+'G</span></div>';});
    document.getElementById('diskContent').innerHTML=dh||'<div style="color:#9a7ab5;font-size:12px">No disk data</div>';

    var n=d.network||[];var nh='';
    n.forEach(function(nn){
      nh+='<div class="net-row"><span class="iface">'+nn.iface+'</span>'+
        '<span class="speed">&darr; '+fmtB(nn.rx_bytes||0)+'  &uarr; '+fmtB(nn.tx_bytes||0)+'</span></div>';});
    document.getElementById('netContent').innerHTML=nh||'<div style="color:#9a7ab5;font-size:12px">No network data</div>';

    var up=d.uptime||{};var ut='';
    if(up.days>0)ut+=up.days+'d ';
    ut+=up.hours+'h '+up.mins+'m';
    document.getElementById('uptimeContent').textContent=ut;

    var bat=d.battery;
    var bc=document.getElementById('batteryCard');
    if(bat){
      bc.style.display='block';
      var col=bat.pct>50?'#34d399':(bat.pct>20?'#fbbf24':'#ef4444');
      document.getElementById('batteryContent').innerHTML='<span style="color:'+col+'">'+bat.pct+'%</span> <span style="color:#9a7ab5;font-size:12px">'+bat.status+'</span>';}
    else{bc.style.display='none';}

    var ps=d.processes||[];var ph='';
    ps.forEach(function(p,i){
      if(i>=5)return;
      ph+='<div class="proc-row"><span style="color:#c084fc;min-width:22px;font-size:12px">'+(i+1)+'</span>'+
        '<span class="name">'+p.name+'</span><span class="mem">'+p.mem+'M</span></div>';});
    document.getElementById('procContent').innerHTML=ph||'<div style="color:#9a7ab5;font-size:12px">No processes</div>';

    var cu=c.usage||0;hist.push(cu);
    if(hist.length>180)hist.shift();
    drawHist();

    var dio=d.diskio;
    if(dio){
      var dih='';
      Object.keys(dio).forEach(function(k){
        var v=dio[k];
        dih+='<div style="display:flex;justify-content:space-between;padding:3px 0;font-size:12px">'+
          '<span style="color:#c084fc;min-width:50px">'+k+'</span>'+
          '<span style="color:#7a4a8a">&darr; '+fmtB(v.rbytes)+'  &uarr; '+fmtB(v.wbytes)+'</span></div>';});
      document.getElementById('diskIOContent').innerHTML=dih||'<div style="color:#9a7ab5;font-size:12px">No disk I/O</div>';}

    var dt=new Date();
    document.getElementById('timeStart').textContent=dt.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
    document.getElementById('timeEnd').textContent=dt.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});});}

update();
setInterval(update,2000);

function togglePremium(){
  fetch('/api/premium').then(function(r){return r.json()}).then(function(d){
    document.querySelectorAll('.premium-node').forEach(function(el){
      el.style.display=d.premium?'block':'none';});});}
togglePremium();
setInterval(togglePremium,30000);


</script>
